<div class="card">
  <h4>Host Local Component (Not Micro-Frontend)</h4>
  <p>Input type: <strong>{{ input.type }}</strong></p>
  <p>Input message: <strong>{{ input.payload['message'] }}</strong></p>
  <p>Input tag: <strong>{{ input.payload['tag'] }}</strong></p>

  <button type="button" (click)="sendAcknowledgement()">Emit output: acknowledged</button>

  <p>Counter: <strong>{{ counter }}</strong></p>
  <button type="button" (click)="increaseCounter()">Emit output: counter-changed</button>
</div>
